name: Build and Auto-Release APK

on:
  push:
    tags:
      - 'v*' # Chạy khi bạn đẩy một tag có định dạng vX.Y.Z (Ví dụ: v2.6.3, v2.6.4)
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Tên thẻ phiên bản cần đóng gói (ví dụ: v2.6.3)'
        required: true
        default: 'v2.6.3'

permissions:
  contents: write # Cấp quyền ghi để tạo Release và đẩy file update.json lên branch main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Thiết lập JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Cấp quyền thực thi cho Gradle Wrapper
        run: chmod +x gradlew

      - name: Tự động tạo và Cập nhật File update.json trên nhánh main
        run: |
          # Xác định tên TAG_NAME dựa trên hình thức kích hoạt (Đẩy thẻ hoặc Bấm nút thủ công)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.version_tag }}"
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi

          # Loại bỏ ký tự 'v' để lấy số phiên bản (Ví dụ: 2.6.3)
          VERSION_NAME=${TAG_NAME#v}
          # Tính toán versionCode bằng cách gom các số (Ví dụ: 2.6.3 -> 263)
          VERSION_CODE=$(echo $VERSION_NAME | tr -d '.')
          
          # URL tải APK trực tiếp từ GitHub Releases của bạn
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/me-va-be-${TAG_NAME}.apk"
          
          echo "Đang xử lý tạo dữ liệu cấu hình cho phiên bản $VERSION_NAME ($VERSION_CODE)..."
          
          # Ghi nội dung mới vào file update.json ở phân hệ gốc để app cài của khách tải về đọc
          cat <<EOF > update.json
          {
            "versionName": "${VERSION_NAME}",
            "versionCode": ${VERSION_CODE},
            "changelog": "• Cập nhật tự động phiên bản mới ${VERSION_NAME} qua GitHub Actions.\n• Tối ưu hệ thống, kiểm thử cài đặt và vá bảo mật tự động.\n• Vui lòng đồng hành và trải nghiệm giao diện nâng cấp mới.",
            "apkUrl": "${APK_URL}"
          }
          EOF
          
          # Thiết lập cấu hình tài khoản Git để push ngược lại GitHub
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Đồng bộ lại mã nguồn mới nhất của nhánh main
          git fetch origin main
          git checkout main || git checkout -b main
          git add update.json
          git commit -m "Auto-update version config to ${TAG_NAME} [skip ci]" || echo "No changes to commit"
          
          # Xử lý đẩy tag và mã nguồn lên GitHub phù hợp với từng trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Xóa các tag trùng cục bộ nếu có
            git tag -d $TAG_NAME || true
            git push origin :refs/tags/$TAG_NAME || true
            git tag $TAG_NAME
            git push origin main --tags
          else
            git push origin main
            git checkout $TAG_NAME
          fi

      - name: Build ứng dụng thành tệp APK (Debug/Test Release)
        run: ./gradlew assembleDebug

      - name: Sao chép và Đổi tên tệp APK đầu ra
        run: |
          # Xác định tên TAG_NAME tương thích
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.version_tag }}"
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi
          mkdir -p build_output
          cp app/build/outputs/apk/debug/app-debug.apk build_output/me-va-be-${TAG_NAME}.apk
          echo "Đã đóng gói thành công APK tại build_output/me-va-be-${TAG_NAME}.apk"

      - name: Tạo Bản phát hành GitHub Release và tải tệp APK lên
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag || github.ref_name }}
          name: Bản Phát Hành ${{ github.event.inputs.version_tag || github.ref_name }}
          body: |
            ## 🎉 Mẹ & Bé đã có phiên bản mới ${{ github.event.inputs.version_tag || github.ref_name }}!
            
            Hệ thống GitHub Actions đã tự quản lý biên dịch và phân phối tự động thành công:
            * **Tên gói cài đặt:** `me-va-be-${{ github.event.inputs.version_tag || github.ref_name }}.apk`
            * **Cách cài đặt:** Khách hàng đang dùng ứng dụng cũ chỉ cần nhấn vào thông báo **Cập nhật ngay** bên trong ứng dụng, hoặc nhấn tải APK đính kèm bên dưới để cài đè trực tiếp!
            
            _Chúc ba mẹ và bé luôn có những trải nghiệm tuyệt vời cùng Mẹ & Bé!_
          draft: false
          prerelease: false
          files: build_output/me-va-be-${{ github.event.inputs.version_tag || github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
